<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edukado | Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #040812;
            --text: #F8FAFC;
            --muted: #475569;
            --active-color: #6366F1;
            --active-opacity: 0.12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background 1.5s ease-in-out;
        }

        .aura {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw; height: 90vw;
            border-radius: 50%;
            filter: blur(160px);
            background: radial-gradient(circle, var(--active-color) 0%, transparent 65%);
            opacity: var(--active-opacity);
            z-index: 0;
            pointer-events: none;
            transition: background 1.5s ease-in-out, opacity 1s ease;
            animation: auraWake 2s ease-out both;
        }

        @keyframes auraWake {
            0% { opacity: 0; }
            100% { opacity: var(--active-opacity); }
        }

        header, .footer-meta {
            animation: chromeIn 1s ease-out both;
        }
        .footer-meta { animation-delay: 0.15s; }

        @keyframes chromeIn {
            0% { opacity: 0; transform: translateY(-6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        header {
            position: relative;
            z-index: 10;
            padding: 50px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Standardized Brand Font */
        .brand-text { 
            font-family: 'Inter', sans-serif;
            font-weight: 800; 
            font-size: 18px; 
            letter-spacing: 3px; 
        }

        .status-pill { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
        .status-pill span { color: var(--active-color); transition: color 0.5s ease; }

        .hub-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
        }

        .prism-nexus {
            position: relative;
            width: 440px;
            height: 440px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 8s ease-in-out infinite;
            animation-delay: 1.6s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Faint ghost outline of the assembled prism, fades out once the
           pieces have locked into place — gives the eye a target to converge on. */
        .prism-nexus::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 0;
            transform: scale(0.6);
            animation: ghostPulse 1.6s cubic-bezier(0.22, 1, 0.36, 1) both;
            pointer-events: none;
        }

        @keyframes ghostPulse {
            0%   { opacity: 0; transform: scale(0.4); }
            45%  { opacity: 0.9; transform: scale(1.08); }
            70%  { opacity: 0.4; transform: scale(0.98); }
            100% { opacity: 0; transform: scale(1); }
        }

        .wedge {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
            animation-duration: 1.5s;
            animation-fill-mode: backwards;
        }

        .wedge-top {
            animation-name: assembleTop;
            animation-delay: 0.1s;
        }
        .wedge-left {
            animation-name: assembleLeft;
            animation-delay: 0.28s;
        }
        .wedge-right {
            animation-name: assembleRight;
            animation-delay: 0.46s;
        }

        @keyframes assembleTop {
            0% {
                opacity: 0;
                transform: translateY(-260px) translateX(-40px) rotate(-25deg) scale(0.75);
                filter: blur(6px);
            }
            65% {
                opacity: 1;
                filter: blur(0);
            }
            80% {
                transform: translateY(6px) translateX(0) rotate(1deg) scale(1.015);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes assembleLeft {
            0% {
                opacity: 0;
                transform: translateX(-300px) translateY(180px) rotate(-30deg) scale(0.75);
                filter: blur(6px);
            }
            65% {
                opacity: 1;
                filter: blur(0);
            }
            80% {
                transform: translateX(5px) translateY(-4px) rotate(-1deg) scale(1.015);
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(0) rotate(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes assembleRight {
            0% {
                opacity: 0;
                transform: translateX(300px) translateY(180px) rotate(30deg) scale(0.75);
                filter: blur(6px);
            }
            65% {
                opacity: 1;
                filter: blur(0);
            }
            80% {
                transform: translateX(-5px) translateY(-4px) rotate(1deg) scale(1.015);
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(0) rotate(0) scale(1);
                filter: blur(0);
            }
        }

        /* Brief unify flash right as the three wedges lock together */
        .prism-nexus::after {
            animation: coreIgnite 1.8s ease-out both;
        }

        @keyframes coreIgnite {
            0%, 55% { opacity: 0; box-shadow: 0 0 0 0 transparent; }
            70% { opacity: 1; box-shadow: 0 0 25px 6px white; }
            100% { opacity: 0.5; box-shadow: 0 0 15px 2px white; }
        }

        .wedge.locked {
            filter: grayscale(1);
            opacity: 0.15;
            cursor: not-allowed;
            pointer-events: none;
        }

        .wedge-top {
            clip-path: polygon(50% 50%, 0% 20%, 50% 0%, 100% 20%);
            padding-bottom: 140px;
        }
        .wedge-left {
            clip-path: polygon(50% 50%, 0% 20%, 0% 80%, 50% 100%);
            padding-right: 140px;
        }
        .wedge-right {
            clip-path: polygon(50% 50%, 100% 20%, 100% 80%, 50% 100%);
            padding-left: 140px;
        }

        .wedge i {
            font-size: 34px;
            margin-bottom: 12px;
            color: var(--muted);
            transition: all 0.5s ease;
        }

        .wedge span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.3;
            transition: opacity 0.5s ease;
        }

        .wedge:not(.locked):hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            z-index: 10;
        }

        .wedge-top:not(.locked):hover   { transform: translateY(-15px); color: #10B981; }
        .wedge-left:not(.locked):hover  { transform: translate(-15px, 10px); color: #EF4444; }
        .wedge-right:not(.locked):hover { transform: translate(15px, 10px); color: #F59E0B; }

        .wedge:not(.locked):hover i { transform: scale(1.1); color: inherit; }
        .wedge:not(.locked):hover span { opacity: 1; }

        .prism-nexus::after {
            content: '';
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px 2px white;
            opacity: 0.5;
        }

        .footer-meta {
            padding: 50px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .meta-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

        .btn-terminate {
            color: #F75F7A;
            text-decoration: none;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            padding: 10px 24px;
            border: 1px solid rgba(247, 95, 122, 0.2);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .btn-terminate:hover { background: #F75F7A; color: white; border-color: #F75F7A; }

    </style>
</head>
<body>

<div class="aura" id="aura"></div>

<header>
    <div class="brand-text">EDUKADO</div>
    <div style="font-size: 12px; font-weight: 500; opacity: 0.6; font-family: 'Inter', sans-serif;">Active Session: {{ user.full_name }} as {{ user.role }}</div>
</header>

<main class="hub-main">
    <div class="prism-nexus">
        {% set can_access_attendance = user.role != 'superadmin' %}
        <a class="wedge wedge-top {{ 'locked' if not can_access_attendance }}"
           {% if can_access_attendance %}
           href="https://127.0.0.1:5002" 
           onmouseover="update('#10B981', 'Attendeez')" 
           onmouseout="reset()"
           {% endif %}>
            <i class="fa-solid fa-clipboard-user"></i>
            <span>Monitoring</span>
        </a>

        <a href="http://127.0.0.1:5003" class="wedge wedge-left"
           onmouseover="update('#EF4444', 'TestPoint')" 
           onmouseout="reset()">
            <i class="fa-solid fa-file-signature"></i>
            <span>Examination</span>
        </a>

        {% set can_access_voting = user.role != 'teacher' %}
        <a class="wedge wedge-right {{ 'locked' if not can_access_voting }}"
           {% if can_access_voting %}
           href="http://127.0.0.1:5001" 
           onmouseover="update('#F59E0B', 'Voxify')" 
           onmouseout="reset()"
           {% endif %}>
            <i class="fa-solid fa-check-to-slot"></i>
            <span>E-Voting</span>
        </a>
    </div>
</main>

<footer class="footer-meta">
    <div class="meta-tag">Integrated Ecosystem Core</div>
    <div class="status-pill"><span id="status"></span></div>
    <a href="/logout" class="btn-terminate">LOGOUT</a>
</footer>

<script>
    const aura = document.getElementById('aura');
    const status = document.getElementById('status');

    function update(color, text) {
        document.documentElement.style.setProperty('--active-color', color);
        document.documentElement.style.setProperty('--active-opacity', '0.22');
        status.innerText = text;
    }

    function reset() {
        document.documentElement.style.setProperty('--active-color', '#6366F1');
        document.documentElement.style.setProperty('--active-opacity', '0.12');
        status.innerText = "";
    }
</script>

</body>
</html>
