<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edukado | System Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #02040a;
            --surface: rgba(15, 23, 42, 0.7);
            --accent: #6366F1;
            --text: #F8FAFC;
            --muted: #475569;
            --error: #F75F7A;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Background Layer 1: Neural Nodes ── */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.4; /* Subtle visibility */
        }

        /* ── Background Layer 2: Grid ── */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 90%);
        }

        .orb {
            position: fixed;
            width: 60vw; height: 60vw;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.12;
            z-index: 2;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            animation: drift 25s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.1); }
        }

        /* ── Login Shard ── */
        .login-card {
            position: relative;
            z-index: 10;
            width: 420px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            padding: 50px 45px;
            box-shadow: 0 25px 70px -10px rgba(0, 0, 0, 0.7);
            transition: var(--transition);
        }

        .header { text-align: center; margin-bottom: 45px; }

        .logo-mark {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 4px;
            color: var(--text);
            margin-bottom: 8px;
            display: block;
        }

        .sys-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 30px; position: relative; }

        .label-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 1.5px;
            transition: var(--transition);
        }

        .input-group:focus-within .label-meta { color: var(--accent); }

        .input-wrap {
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 4px 12px -4px rgba(99, 102, 241, 0.2); }

        .input-wrap i:not(.toggle-pass) {
            position: absolute;
            left: 0; top: 12px;
            font-size: 14px;
            color: var(--muted);
            transition: var(--transition);
        }

        .input-group:focus-within i:not(.toggle-pass) { color: var(--accent); }

        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 35px 12px 30px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
        }

        .toggle-pass {
            position: absolute;
            right: 0; top: 12px;
            font-size: 14px;
            color: var(--muted);
            cursor: pointer;
            transition: var(--transition);
        }
        .toggle-pass:hover { color: var(--text); }

        .btn-auth {
            width: 100%;
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 18px;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-auth:hover { background: var(--accent); color: white; box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }

        .spinner {
            display: none;
            width: 14px; height: 14px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-auth.loading .spinner { display: block; }
        .btn-auth.loading span { opacity: 0.7; }

        .footer-note {
            margin-top: 40px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .error-message {
            background: rgba(247, 95, 122, 0.1);
            border-left: 3px solid var(--error);
            color: var(--error);
            padding: 12px;
            font-size: 11px;
            margin-bottom: 25px;
            text-align: left;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

    </style>
</head>
<body>

<!-- Neural Background Canvas -->
<canvas id="bg-canvas"></canvas>

<div class="grid-bg"></div>
<div class="orb"></div>

<div class="login-card">
    <div class="header">
        <span class="logo-mark">EDUKADO</span>
        <span class="sys-label">Gateway Protocol</span>
    </div>

    {% if error %}
    <div class="error-message">
        <i class="fa-solid fa-shield-halved"></i> ACCESS DENIED: {{ error }}
    </div>
    {% endif %}

    <form id="handshakeForm" action="/login" method="POST" onsubmit="handleHandshake(event)">
        <input type="hidden" name="next" value="{{ next }}">
        
        <div class="input-group">
            <span class="label-meta">01 // USER ID</span>
            <div class="input-wrap">
                <i class="fa-solid fa-fingerprint"></i>
                <input type="text" name="username" placeholder="S26-XXXX" required autocomplete="username">
            </div>
        </div>

        <div class="input-group">
            <span class="label-meta">02 // PASSWORD</span>
            <div class="input-wrap">
                <i class="fa-solid fa-shield-keyhole"></i>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                <i class="fa-solid fa-eye toggle-pass" id="togglePass" onclick="toggleVisibility()"></i>
            </div>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
            <div class="spinner"></div>
            <span>Login Portal</span>
        </button>
    </form>

    <div class="footer-note">
        SYSTEM INTEGRATION PROJECT
    </div>
</div>

<script>
    // ── Neural Network Background Logic ──
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#6366F1';
        ctx.strokeStyle = '#6366F1';

        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;

            if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();

            for (let j = i + 1; j < particles.length; j++) {
                let p2 = particles[j];
                let dist = Math.sqrt((p.x - p2.x)**2 + (p.y - p2.y)**2);
                if (dist < 150) {
                    ctx.globalAlpha = 1 - (dist / 150);
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
        }
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init();
    draw();

    // ── Form Logic ──
    function toggleVisibility() {
        const passInput = document.getElementById('password');
        const icon = document.getElementById('togglePass');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function handleHandshake(e) {
        const btn = document.getElementById('submitBtn');
        btn.classList.add('loading');
        btn.querySelector('span').innerText = "Verifying Identity...";
    }
</script>

</body>
</html>
