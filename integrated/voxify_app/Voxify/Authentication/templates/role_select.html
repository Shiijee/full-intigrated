<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - Voxify</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('auth.static', filename='css/role_select.css') }}">
</head>
<body>
    <div class="container">
        <h1>Voxify E-Voting System</h1>
        <div class="subtitle">Secure, Transparent, Democratic</div>
        
        <div class="role-grid">
            <a href="{{ url_for('auth.voter_login') }}" class="role-card voter">
                <div class="role-icon">🗳️</div>
                <h2>Voter Login</h2>
                <p>Cast your vote securely in ongoing elections. View results and track your voting history.</p>
            </a>
            
            <a href="{{ url_for('auth.admin_login') }}" class="role-card admin">
                <div class="role-icon">👔</div>
                <h2>Admin Login</h2>
                <p>Manage elections, candidates, voters, and view real-time results.</p>
            </a>
        </div>
        
        <div class="back-link">
            <a href="#"></a>
        </div>
    </div>
</body>
</html>
