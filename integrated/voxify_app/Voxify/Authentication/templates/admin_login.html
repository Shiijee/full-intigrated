<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="{{ url_for('auth.static', filename='favicon.ico') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxify — Admin Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('auth.static', filename='css/login.css') }}">
</head>

<body>

<!-- LEFT PANEL -->
<div class="left-panel">

  <div class="brand">
    <div class="brand-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="brand-name">Voxify</span>
    </div>
  </div>

  <div class="hero-text">
    <h1>Administrator<br><em>Dashboard</em></h1>
  </div>

  <div class="left-spacer"></div>

</div>


<!-- RIGHT PANEL -->
<div class="right-panel">

  <div class="login-box">

    <div class="login-header">
      <h2>Admin Portal</h2>
      <p>Enter your administrator credentials</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" name="username" placeholder="Enter your admin username" value="{{ prefill_username or '' }}" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap password-wrap">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input id="password" type="password" name="password" placeholder="Enter your password" required>
          <button type="button" class="toggle-btn" onclick="togglePassword('password','toggleIcon')" aria-label="Show password">
            <img id="toggleIcon" src="{{ url_for('auth.static', filename='images/hidden.png') }}" alt="Show password" data-show="{{ url_for('auth.static', filename='images/eye.png') }}" data-hide="{{ url_for('auth.static', filename='images/hidden.png') }}">
          </button>
        </div>
      </div>

      <div class="form-options">
        <a href="{{ url_for('auth.forgot_password', role='admin') }}" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Admin Login →</button>

    </form>

    <!-- Back to Voter Login Link -->
    <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border);">
      <p style="color: var(--muted); font-size: 0.75rem;">
        Voter? 
        <a href="{{ url_for('auth.voter_login') }}" style="color: var(--navy); text-decoration: none; font-weight: 500;">
          Voter Login →
        </a>
      </p>
    </div>

  </div>

</div>

<script src="{{ url_for('auth.static', filename='js/admin_login.js') }}"></script>

</body>
</html>
